
<div class="btn-toolbar mb-2 mb-md-0">
  <button class="btn btn-sm btn-outline-primary me-2" (click)="switchRole()">
    <i class="bi bi-arrow-repeat"></i> Changer de rôle
  </button>
  <button class="btn btn-sm btn-outline-primary" *ngIf="isAlsoProfessor" (click)="switchToProfessorDashboard()">
    <i class="bi bi-person-workspace"></i> Voir tableau professeur
  </button>
</div>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 d-none d-md-block bg-dark sidebar">
            <div class="sidebar-sticky">
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link" routerLink="/admin/validation" routerLinkActive="active">
                            <i class="bi bi-person-check"></i> Validation des inscriptions
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" routerLink="/admin/users" routerLinkActive="active">
                            <i class="bi bi-people"></i> Gestion des utilisateurs
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" routerLink="/admin/subjects" routerLinkActive="active">
                            <i class="bi bi-book"></i> Gestion des matières
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" routerLink="/admin/import" routerLinkActive="active">
                            <i class="bi bi-file-earmark-spreadsheet"></i> Import CSV
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" routerLink="/admin/professor-preferences" routerLinkActive="active">
                            <i class="bi bi-calendar-heart"></i> Préférences des profs
                        </a>
                    </li>
                    <!-- ✅ AJOUTER LE LIEN "GÉNÉRER EMPLOI" -->
                    <li class="nav-item">
                        <a class="nav-link" routerLink="/admin/schedule-generator" routerLinkActive="active">
                            <i class="bi bi-calendar-plus"></i> Générer emploi
                        </a>
                    </li>
                    <!-- ✅ AJOUTER LE LIEN "PÉRIODES DE SAISIE" -->
                    <li class="nav-item">
                        <a class="nav-link" routerLink="/admin/submission-periods" routerLinkActive="active">
                            <i class="bi bi-clock-history"></i> Périodes de saisie
                        </a>
                    </li>
                </ul>
            </div>
        </nav>
        
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">Tableau de bord Admin</h1>
                <!-- ✅ AJOUTER UN BOUTON POUR BASCOLER ENTRE ADMIN ET PROFESSEUR -->
                <div class="btn-toolbar mb-2 mb-md-0" *ngIf="isAlsoProfessor">
                    <button class="btn btn-sm btn-outline-primary" (click)="switchToProfessorDashboard()">
                        <i class="bi bi-person-workspace"></i> Voir tableau professeur
                    </button>
                </div>
            </div>
        </main>
    </div>
</div>
